mode: ContinuousDeployment
branches:
  main:
    regex: ^main$
    label: ''
  feature:
    mode: ContinuousDelivery
    regex: ^(features?|f2calv|copilot)[/-](?<BranchName>.+)
    label: '{BranchName}'
  preview:
    regex: ^preview?[/-]
    label: preview-{BranchName}
    source-branches: [main]
ignore:
  sha: []
merge-message-formats: {}
